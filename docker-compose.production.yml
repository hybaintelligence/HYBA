services:
  hyba-backend:
    build: .
    command: python -m uvicorn hyba_genesis_api.main:app --host 0.0.0.0 --port 3001
    environment:
      NODE_ENV: production
      HYBA_ENV: production
      PYTHONPATH: /app/python_backend
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      HYBA_OPERATOR_CREDENTIALS: ${HYBA_OPERATOR_CREDENTIALS:?HYBA_OPERATOR_CREDENTIALS is required}
      HYBA_ENABLE_AUDIT_LOGGING: ${HYBA_ENABLE_AUDIT_LOGGING:-true}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/api/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  hyba-runtime:
    build: .
    command: python -m pythia_mining.main
    depends_on:
      hyba-backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HYBA_ENV: production
      PYTHONPATH: /app/python_backend
      HYBA_ALLOW_DEV_FIXTURES: "false"
      HYBA_ENABLE_LIVE_STRATUM: ${HYBA_ENABLE_LIVE_STRATUM:-true}
      HYBA_ENABLE_MINING_AUTOCONNECT: ${HYBA_ENABLE_MINING_AUTOCONNECT:-false}
      HYBA_ENABLE_LIVE_SHARE_SUBMIT: ${HYBA_ENABLE_LIVE_SHARE_SUBMIT:-false}
      HYBA_LIVE_SHARE_APPROVAL_ID: ${HYBA_LIVE_SHARE_APPROVAL_ID:-}
      HYBA_ENABLE_AUDIT_LOGGING: ${HYBA_ENABLE_AUDIT_LOGGING:-true}
      # Enhanced Theoretical Framework Configuration
      HYBA_SYSTEM_COMPLEXITY: ${HYBA_SYSTEM_COMPLEXITY:-high}
      HYBA_COMPUTATIONAL_BUDGET: ${HYBA_COMPUTATIONAL_BUDGET:-high}
      HYBA_PULVINI_PHI_TIER: ${HYBA_PULVINI_PHI_TIER:-12}
      HYBA_ENABLE_ENHANCED_PENROSE_OR: ${HYBA_ENABLE_ENHANCED_PENROSE_OR:-true}
      HYBA_ENABLE_ENHANCED_IIT_PARTITIONING: ${HYBA_ENABLE_ENHANCED_IIT_PARTITIONING:-true}
      HYBA_ENABLE_DEUTSCH_SUBSTRATE: ${HYBA_ENABLE_DEUTSCH_SUBSTRATE:-true}
      HYBA_ENABLE_DYNAMIC_PHI_SCALING: ${HYBA_ENABLE_DYNAMIC_PHI_SCALING:-true}
      HYBA_ENABLE_ASYNC_ENHANCED_ANALYSIS: ${HYBA_ENABLE_ASYNC_ENHANCED_ANALYSIS:-true}
      # Pool Configuration
      HYBA_POOL_NICEHASH_URL: ${HYBA_POOL_NICEHASH_URL:-}
      HYBA_POOL_NICEHASH_USERNAME: ${HYBA_POOL_NICEHASH_USERNAME:-}
      HYBA_POOL_NICEHASH_PASSWORD: ${HYBA_POOL_NICEHASH_PASSWORD:-}
      HYBA_POOL_NICEHASH_STRATUM_VERSION: ${HYBA_POOL_NICEHASH_STRATUM_VERSION:-1}
      HYBA_POOL_VIABTC_URL: ${HYBA_POOL_VIABTC_URL:-}
      HYBA_POOL_VIABTC_USERNAME: ${HYBA_POOL_VIABTC_USERNAME:-}
      HYBA_POOL_VIABTC_PASSWORD: ${HYBA_POOL_VIABTC_PASSWORD:-}
      HYBA_POOL_VIABTC_STRATUM_VERSION: ${HYBA_POOL_VIABTC_STRATUM_VERSION:-1}
      HYBA_POOL_CKPOOL_URL: ${HYBA_POOL_CKPOOL_URL:-}
      HYBA_POOL_CKPOOL_USERNAME: ${HYBA_POOL_CKPOOL_USERNAME:-}
      HYBA_POOL_CKPOOL_BTC_ADDRESS: ${HYBA_POOL_CKPOOL_BTC_ADDRESS:-}
      HYBA_POOL_CKPOOL_PASSWORD: ${HYBA_POOL_CKPOOL_PASSWORD:-}
      HYBA_POOL_CKPOOL_STRATUM_VERSION: ${HYBA_POOL_CKPOOL_STRATUM_VERSION:-1}
      HYBA_POOL_BRAIINS_URL: ${HYBA_POOL_BRAIINS_URL:-}
      HYBA_POOL_BRAIINS_USERNAME: ${HYBA_POOL_BRAIINS_USERNAME:-}
      HYBA_POOL_BRAIINS_PASSWORD: ${HYBA_POOL_BRAIINS_PASSWORD:-}
      HYBA_POOL_BRAIINS_STRATUM_VERSION: ${HYBA_POOL_BRAIINS_STRATUM_VERSION:-2}
      HYBA_POOL_STRATUMV2_URL: ${HYBA_POOL_STRATUMV2_URL:-}
      HYBA_POOL_STRATUMV2_USERNAME: ${HYBA_POOL_STRATUMV2_USERNAME:-}
      HYBA_POOL_STRATUMV2_PASSWORD: ${HYBA_POOL_STRATUMV2_PASSWORD:-}
      HYBA_POOL_STRATUMV2_STRATUM_VERSION: ${HYBA_POOL_STRATUMV2_STRATUM_VERSION:-2}
    restart: unless-stopped

  hyba-bridge:
    build: .
    command: node dist/server.mjs
    depends_on:
      hyba-backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HYBA_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PULVINI_BACKEND_URL: http://hyba-backend:3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      HYBA_INTERNAL_HEALTH_TOKEN: ${HYBA_INTERNAL_HEALTH_TOKEN:-}
      HYBA_ENABLE_MINING_AUTOCONNECT: ${HYBA_ENABLE_MINING_AUTOCONNECT:-false}
      BACKEND_PROXY_TIMEOUT_MS: ${BACKEND_PROXY_TIMEOUT_MS:-30000}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/bridge/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped
