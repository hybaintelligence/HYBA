name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

jobs:
  frontend-gate:
    name: Frontend lint, tests, coverage, e2e, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npm run lint -- --skipLibCheck
      - name: Frontend property tests
        run: npm run test:property:frontend
      - name: Bridge/server tests
        run: npm run test:bridge
      - name: Frontend coverage gate
        run: npm run test:frontend:coverage
      - name: Playwright E2E
        run: npm run test:frontend:e2e
      - name: Build frontend/server bundle
        run: npm run build
