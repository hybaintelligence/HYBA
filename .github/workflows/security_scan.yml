name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  HYBA_PYTHON_VERSION: '3.12.7'

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.HYBA_PYTHON_VERSION }}
      - name: Install Python security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
      - name: Audit Python dependencies
        run: |
          # Audit locked dependencies; allow non-zero exit to report findings without blocking
          pip-audit -r python_backend/hyba_genesis_api/requirements.txt || true
      - name: Run bandit security analysis
        run: |
          bandit -r python_backend -x python_backend/tests
      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm install --package-lock-only
      - name: Audit Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          # Allow non-zero exit to avoid failing the workflow on known issues;
          # review npm-audit-results.json in PR comments
          npm audit --audit-level=high --json > npm-audit-results.json || true
