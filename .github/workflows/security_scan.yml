name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  HYBA_PYTHON_VERSION: '3.12.7'

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.HYBA_PYTHON_VERSION }}
      - name: Install Python security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit
      - name: Run gitleaks secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose
      - name: Audit Python dependencies
        run: |
          pip-audit -r python_backend/hyba_genesis_api/requirements.txt
      - name: Run bandit security analysis
        run: |
          bandit -r python_backend -x python_backend/tests
      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm ci --ignore-scripts
      - name: Audit Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm audit --audit-level=high
