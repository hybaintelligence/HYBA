name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/hyba_genesis_api/requirements.txt
      
      - name: Run quantum regeneration property tests
        run: |
          PYTHONPATH=python_backend python3 -m pytest tests/test_quantum_regeneration_properties.py -v --tb=short
      
      - name: Run salamander frontier tests
        run: |
          PYTHONPATH=python_backend python3 -m pytest tests/test_salamander_frontier.py -v --tb=short
      
      - name: Run regeneration manager API tests
        run: |
          PYTHONPATH=python_backend python3 -m pytest tests/test_regeneration_manager_api.py -v --tb=short
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            *.xml
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install flake8==7.0.0
          pip install -r python_backend/hyba_genesis_api/requirements.txt
      
      - name: Lint Python code
        run: |
          flake8 python_backend/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=python_backend/hyba_genesis_api/api/quantum_as_a_service_execute_hardened.py,python_backend/pythia_mining/operator_approval_timeout.py,python_backend/pythia_mining/resonance_synthesis.py,python_backend/pythia_mining/stratum_idempotency_integration.py,python_backend/pythia_mining/benchmark_formalism.py,python_backend/hyba_genesis_api/api/security.py,python_backend/hyba_genesis_api/analytics/revenue_engine.py,python_backend/hyba_genesis_api/api/agentic_intelligence_service/mining_agents.py,python_backend/pythia_mining/grover_structured_search.py
          flake8 python_backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install safety==2.3.5
          pip install -r python_backend/hyba_genesis_api/requirements.txt
      
      - name: Run Safety check
        run: |
          safety check --json --output safety-report.json || true
      
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: safety-report.json
          retention-days: 30

  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r python_backend/hyba_genesis_api/requirements.txt
          pip install pytest hypothesis psutil pytest-benchmark
      
      - name: Run benchmarks
        run: |
          PYTHONPATH=python_backend python3 -m pytest tests/test_quantum_regeneration_properties.py -v
      
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            .pytest_cache/
            benchmark-results/
          retention-days: 90

  dependency-review:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, Python-2.0, MPL-2.0, ISC
          fail-on-severity: high