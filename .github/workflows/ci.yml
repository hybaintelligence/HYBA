name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hyba
          POSTGRES_PASSWORD: hyba
          POSTGRES_DB: hyba
        options: >-
          --health-cmd "pg_isready -U hyba -d hyba"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          cache: pip
          cache-dependency-path: |
            python_backend/requirements.txt
            python_backend/requirements.test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/requirements.txt
          pip install -r python_backend/requirements.test.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 python_backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 python_backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy python_backend --ignore-missing-imports || true

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+psycopg2://hyba:hyba@localhost:5432/hyba
          REDIS_URL: redis://localhost:6379
          HYBA_STARTUP_SELF_HEALING_ENABLED: "false"
        run: |
          python -m pytest tests/test_fault_tolerant_quantum.py \
            tests/test_quantum_as_a_service_api.py \
            tests/test_computational_intelligence_service_api.py \
            tests/test_commercial_public_api.py -v --cov=python_backend --cov-report=xml

      - name: Run verifier firewall gate
        run: bash scripts/run_verifier_firewall_gate.sh

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
