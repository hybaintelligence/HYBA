name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test" \
          --health-interval=10s \
          --health-timeout=5s \
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/test_db
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/requirements.txt
          pip install psycopg2-binary
      - name: Run pytest
        run: |
          pytest -q
      - name: Run verifier firewall gate
        run: |
          bash scripts/run_verifier_firewall_gate.sh

  load-test:
    name: API smoke load test
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: sqlite:///data/metrics.db
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies and Locust
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/requirements.txt
          pip install locust uvicorn psycopg2-binary
      - name: Start API in background
        run: |
          uvicorn python_backend.hyba_genesis_api.main:app --port 3001 &
          sleep 10
      - name: Run Locust smoke test
        run: |
          locust -f load_testing/locustfile.py --host=http://localhost:3001 --users=5 --spawn-rate=5 --run-time=1m --headless --csv=locust_report
