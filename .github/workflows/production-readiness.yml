name: Production Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  runtime-guardrails:
    name: Runtime mock/static telemetry guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Assert runtime paths do not contain fabricated telemetry
        run: python scripts/check_no_runtime_mocks.py

  backend-regression:
    name: Backend regression, MIDAS, and mining validation
    runs-on: ubuntu-latest
    needs: runtime-guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_backend/hyba_genesis_api/requirements.txt
      - name: Run backend unit, integration, adversarial, property-style, and MIDAS tests
        env:
          PYTHONPATH: python_backend
          HYBA_ALLOW_DEV_FIXTURES: "true"
          HYBA_ENABLE_LIVE_STRATUM: "false"
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Import FastAPI app and assert readiness route exists
        env:
          PYTHONPATH: python_backend
          JWT_SECRET: ci-secret
        run: |
          python - <<'PY'
          from hyba_genesis_api.main import app
          routes = {route.path for route in app.routes}
          required = {
              '/health',
              '/api/health/readiness',
              '/api/auth/login',
              '/api/products',
              '/api/mining/status',
              '/api/mining/ops/metrics',
              '/api/mining/ops/audit',
              '/api/mining/ops/profitability',
          }
          missing = sorted(required - routes)
          if missing:
              raise SystemExit(f'Missing backend routes: {missing}')
          print('backend import smoke passed')
          PY

  frontend-typecheck:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    needs: runtime-guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npm run lint
      - name: Build frontend/server bundle
        run: npm run build

  production-config-smoke:
    name: Production config guardrails
    runs-on: ubuntu-latest
    needs: runtime-guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_backend/hyba_genesis_api/requirements.txt
      - name: Assert production mode rejects missing pool config
        env:
          NODE_ENV: production
          HYBA_ENV: production
          PYTHONPATH: python_backend
        run: |
          python - <<'PY'
          from pythia_mining.stratum_client import PoolManager, ProductionConfigurationError
          try:
              PoolManager()
          except ProductionConfigurationError:
              raise SystemExit(0)
          raise SystemExit('PoolManager unexpectedly accepted missing production pool config')
          PY
      - name: Assert production fixtures are blocked with pool config present
        env:
          NODE_ENV: production
          HYBA_ENV: production
          PYTHONPATH: python_backend
          HYBA_POOL_NICEHASH_URL: stratum+ssl://sha256.eu.nicehash.com:33334
          HYBA_POOL_NICEHASH_USERNAME: ci-user
          HYBA_POOL_NICEHASH_PASSWORD: ci-secret
          HYBA_ALLOW_DEV_FIXTURES: "false"
        run: |
          python - <<'PY'
          from pythia_mining.stratum_client import PoolManager, ProductionConfigurationError
          pool = PoolManager().get_active_pool()
          try:
              pool.inject_simulated_target_job(1.0)
          except ProductionConfigurationError:
              raise SystemExit(0)
          raise SystemExit('Production fixture path was not blocked')
          PY
      - name: Validate production environment contract
        env:
          PYTHONPATH: python_backend
          NODE_ENV: production
          HYBA_ENV: production
          JWT_SECRET: ci-production-secret-value-at-least-32-chars
          PULVINI_BACKEND_URL: http://127.0.0.1:3001
          HYBA_ALLOW_DEV_FIXTURES: "false"
          HYBA_ENABLE_LIVE_STRATUM: "true"
          HYBA_ENABLE_MINING_AUTOCONNECT: "false"
          HYBA_ENABLE_LIVE_SHARE_SUBMIT: "false"
          HYBA_ENABLE_AUDIT_LOGGING: "true"
          HYBA_POOL_NICEHASH_URL: stratum+ssl://sha256.eu.nicehash.com:33334
          HYBA_POOL_NICEHASH_USERNAME: ci-user
          HYBA_POOL_NICEHASH_PASSWORD: ci-secret
        run: |
          python - <<'PY'
          import os
          from argon2 import PasswordHasher
          from scripts import validate_production_env
          os.environ['HYBA_OPERATOR_CREDENTIALS'] = f"operator:{PasswordHasher().hash('ci-password')}:mining_operator"
          raise SystemExit(validate_production_env.main())
          PY

  docker-build:
    name: Production Docker image build
    runs-on: ubuntu-latest
    needs: [backend-regression, frontend-typecheck, production-config-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t hyba-fullstack:ci .
