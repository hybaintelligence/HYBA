name: HYBA Fullstack Container CI

on:
  pull_request:
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - python_backend/hyba_genesis_api/requirements.txt
      - scripts/**
      - src/**
      - public/**
      - index.html
      - .github/workflows/docker-build.yml
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_profile:
        description: Image profile tag to publish.
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod
          - benchmark
      image_name:
        description: Container image name under the selected registry namespace.
        required: true
        default: hyba-fullstack
        type: string
      push_image:
        description: Push the built image to the registry.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: hyba-fullstack-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  DEFAULT_IMAGE_NAME: hyba-fullstack
  DEFAULT_BUILD_PROFILE: prod

jobs:
  build-scan-publish:
    name: Build, scan, and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image coordinates
        id: image
        shell: bash
        run: |
          image_name="${{ inputs.image_name || env.DEFAULT_IMAGE_NAME }}"
          build_profile="${{ inputs.build_profile || env.DEFAULT_BUILD_PROFILE }}"
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"

          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "profile=${build_profile}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${owner_lc}/${image_name}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ steps.image.outputs.profile }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ steps.image.outputs.profile }}-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=HYBA Fullstack
            org.opencontainers.image.description=Unified Node build and Python FastAPI runtime image for HYBA.

      - name: Build image for pull request validation
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: hyba-fullstack:ci
          build-args: |
            HYBA_BUILD_PROFILE=${{ steps.image.outputs.profile }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and optionally push image
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: ${{ github.event_name == 'workflow_dispatch' && !inputs.push_image }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HYBA_BUILD_PROFILE=${{ steps.image.outputs.profile }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload filesystem scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

      - name: Run Trivy image scan for pull requests
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: hyba-fullstack:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Run Trivy image scan for local workflow dispatch builds
        if: github.event_name == 'workflow_dispatch' && !inputs.push_image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.image.outputs.image }}:${{ steps.image.outputs.profile }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Create deployment artifact
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          {
            echo "Profile: ${{ steps.image.outputs.profile }}"
            echo "Image: ${{ steps.image.outputs.image }}"
            echo "Tags:"
            printf '%s\n' '${{ steps.meta.outputs.tags }}'
            echo "Digest: ${{ steps.build.outputs.digest }}"
          } > deployment-info.txt

      - name: Upload deployment artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: hyba-fullstack-deployment-info
          path: deployment-info.txt
