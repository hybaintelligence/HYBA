name: HYBA Fullstack Container CI with Docker Build Cloud

on:
  pull_request:
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - python_backend/hyba_genesis_api/requirements.txt
      - scripts/**
      - src/**
      - public/**
      - index.html
      - .github/workflows/docker-build.yml
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push_image:
        description: Push the built image to the registry.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: hyba-fullstack-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DEFAULT_IMAGE_NAME: hyba-fullstack

jobs:
  build-scan-push-with-docker-cloud:
    name: Build, scan, and push with Docker Build Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image coordinates
        id: image
        shell: bash
        run: |
          image_name="hyba-fullstack"
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          docker_repo="${{ secrets.DOCKERHUB_REPOSITORY }}"
          
          if [ -z "$docker_repo" ]; then
            if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
              docker_repo="${{ secrets.DOCKERHUB_USERNAME }}/hyba-fullstack"
            else
              docker_repo="${owner_lc}/hyba-fullstack"
            fi
          fi

          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "docker_repo=${docker_repo}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx with Docker Build Cloud
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.docker_repo }}
          tags: |
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=HYBA Fullstack
            org.opencontainers.image.description=Unified Node build and Python FastAPI runtime image for HYBA.

      - name: Build image for pull request validation (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: false
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.docker_repo }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            HYBA_BUILD_PROFILE=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image with Docker Build Cloud
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HYBA_BUILD_PROFILE=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload filesystem scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

      - name: Image build summary
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Docker Build Cloud deployment successful"
          echo "Image: ${{ env.REGISTRY }}/${{ steps.image.outputs.docker_repo }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Platform support: linux/amd64,linux/arm64"
