name: Docker Build Cloud Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  HYBA_PYTHON_VERSION: '3.12.7'

jobs:
  build-with-docker-cloud:
    name: Build with Docker Build Cloud and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx with Docker Build Cloud
        uses: docker/setup-buildx-action@v3
        with:
          # Use Docker Build Cloud builder
          driver-options: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub repository
        id: docker-repo
        run: |
          REPO="${{ secrets.DOCKERHUB_REPOSITORY }}"
          if [ -z "$REPO" ]; then
            REPO="${{ secrets.DOCKERHUB_USERNAME }}/hyba-fullstack"
          fi
          echo "repository=${REPO}" >> $GITHUB_OUTPUT

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.docker-repo.outputs.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push with Docker Build Cloud
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HYBA_BUILD_PROFILE=prod
          platforms: linux/amd64,linux/arm64

      - name: Image push summary
        run: |
          echo "✅ Image built and pushed with Docker Build Cloud"
          echo "Repository: ${{ steps.docker-repo.outputs.repository }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
