name: Terraform Provider CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'terraform-provider-hyba/**'
      - '.github/workflows/terraform-provider-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'terraform-provider-hyba/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: 'terraform-provider-hyba/go.sum'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: terraform-provider-hyba

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: 'terraform-provider-hyba/go.sum'

      - name: Run tests
        run: |
          cd terraform-provider-hyba
          go test -v -cover -timeout=5m ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./terraform-provider-hyba/coverage.out
          flags: terraform-provider

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd terraform-provider-hyba
          go build -o terraform-provider-hyba_v1.0.0_${{ matrix.os }}_${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: terraform-provider-${{ matrix.os }}-${{ matrix.arch }}
          path: terraform-provider-hyba/terraform-provider-hyba_v1.0.0_${{ matrix.os }}_${{ matrix.arch }}

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: terraform-provider-hyba
          push: true
          tags: |
            hyba/terraform-provider:latest
            hyba/terraform-provider:${{ github.sha }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: terraform-provider-*/terraform-provider-hyba_v1.0.0_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
