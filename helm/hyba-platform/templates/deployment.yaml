apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyba-platform
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: hyba-platform
  template:
    metadata:
      labels:
        app: hyba-platform
    spec:
      containers:
        - name: hyba-platform
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3001
          env:
            - name: HYBA_ENVIRONMENT
              value: "{{ .Values.environment }}"
